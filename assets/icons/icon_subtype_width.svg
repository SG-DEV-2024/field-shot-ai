<?xml version="1.0" encoding="UTF-8"?>
<!--
  icon_subtype_width.svg
  규격조사 subtype — 벽/기둥/부재 폭 측정 (wall_or_member_width)
  사용 위치: S-002 규격조사 유형 선택 화면 카드 (44×44 영역)
-->
<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 44 44" fill="none">
  <!-- 부재 (가로 직사각형) -->
  <rect x="6" y="20" width="32" height="12" rx="1"
        fill="#cbd5e1" stroke="#94a3b8" stroke-width="1"/>
  <!-- 시작/끝점 마커 -->
  <circle cx="8" cy="26" r="1.7" fill="#2563EB"/>
  <circle cx="36" cy="26" r="1.7" fill="#2563EB"/>
  <!-- 양방향 화살표 (상단) -->
  <path d="M8 13 H36" stroke="#475569" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M11 10.5 L8 13 L11 15.5"
        stroke="#475569" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M33 10.5 L36 13 L33 15.5"
        stroke="#475569" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- 점선 가이드 (시작/끝점 → 화살표) -->
  <path d="M8 19 V14" stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="1.5 1.5"/>
  <path d="M36 19 V14" stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="1.5 1.5"/>
</svg>
